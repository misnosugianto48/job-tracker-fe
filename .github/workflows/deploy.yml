name: Frontend CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm test

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.git' \
            --exclude '.env' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/frontend/

      - name: Build and start frontend container
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << 'EOF'
            set -e
            cd ${{ secrets.VPS_TARGET_DIR }}/frontend
            
            # Inject VITE_API_URL sebelum build agar terbake ke bundle
            echo "VITE_API_URL=https://api-jobtrack.devmisno.web.id/api" > .env
            
            docker compose up --build -d
            docker image prune -f
            
            # Verifikasi URL yang terbake
            echo "===== Verifying baked API URL ====="
            docker compose exec -T frontend grep -r "api-jobtrack.devmisno.web.id" /usr/share/nginx/html/assets/ || echo "⚠️ API URL not found in bundle!"
          EOF
