name: Frontend CI/CD Pipeline (Docker)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

    - name: Transfer Frontend Files to VPS
      run: |
        # Create target directory on VPS
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "mkdir -p ${{ secrets.VPS_TARGET_DIR }}/frontend"
        
        # Sync frontend source and nginx config (exclude local node_modules / builds)
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" --delete --exclude 'node_modules' --exclude 'dist' ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/frontend/
        
        # Copy docker-compose.yml to the root directory
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/

    - name: Build and Start Frontend Container on VPS
      run: |
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          cd ${{ secrets.VPS_TARGET_DIR }} &&
          docker compose up --build -d frontend
        "
