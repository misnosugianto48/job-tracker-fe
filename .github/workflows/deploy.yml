name: Frontend CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.git' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/frontend/

      - name: Build and start frontend container
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
            cd ${{ secrets.VPS_TARGET_DIR }}/frontend &&
            docker compose up --build -d &&
            docker image prune -f
          "
